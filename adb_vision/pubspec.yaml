name: adb_vision
description: Cross-platform Flutter desktop front-end for the Android Debug Bridge, built on the adb_kit package.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  adb_kit:
    path: ../adb_kit
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  desktop_drop: ^0.4.4
  shared_preferences: ^2.3.2
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
