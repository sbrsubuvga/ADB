name: adb_kit
description: A typed Dart wrapper around the Android Debug Bridge (adb). Covers device management, app install, input injection, screencap/screenrecord, logcat streaming, files, intents, dumpsys and scripting.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.4.0

dependencies:
  meta: ^1.12.0
  async: ^2.11.0
  path: ^1.9.0

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
